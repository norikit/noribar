# SwiftLint configuration for noribar.
# Run locally with `swiftlint` (brew install swiftlint); CI runs `swiftlint --strict`.
# Docs: https://realm.github.io/SwiftLint/rule-directory.html

# Lint these once sources exist; harmless to list before they do.
included:
  - Sources
  - Tests

excluded:
  - .build
  - docs

# A handful of opt-in rules that pay off for low-latency, main-thread UI code.
opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - redundant_nil_coalescing
  - unused_import

# Native SF Symbol / SLS APIs sometimes mean longer lines & files; keep relaxed.
line_length:
  warning: 120
  error: 160
  ignores_comments: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 350
  error: 500

# C-interop idioms. noribar bridges two C APIs (the Lua C-API and private SkyLight) and
# these names are deliberate conventions, not sloppiness:
#   - `L` is THE Lua C-API name for a `lua_State *` — kept verbatim for anyone who knows Lua.
#   - C-style constant/typealias names carry underscores (RTLD_DEFAULT; the @convention(c)
#     function typealiases `Fn_…`).
# Everything else uses descriptive Swift names.
identifier_name:
  # Short names are idiomatic throughout the two C bridges and tight closures: `L` is the
  # Lua C-API name for a lua_State, `id`/`vm` and loop vars (`k`, `v`, `t`) read fine. The
  # rest of identifier_name (casing, max length, allowed symbols) still applies.
  min_length:
    warning: 1
  excluded:
    - L                    # the Lua C-API name for a `lua_State *` (kept verbatim)
  allowed_symbols: ["_"]   # C-style constants like RTLD_DEFAULT

type_name:
  allowed_symbols: ["_"]   # @convention(c) typealias names like Fn_SetWindowLevel
