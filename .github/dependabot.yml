version: 2
updates:
  # Keep the GitHub Actions used by CI patched.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Swift Package Manager dependencies. No-op until a Package.swift /
  # Package.resolved exists; safe to keep enabled now.
  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
